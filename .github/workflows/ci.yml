name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux (GCC ${{ matrix.gcc }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        gcc: ['13', '14']
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC ${{ matrix.gcc }}
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-${{ matrix.gcc }}
          echo "CC=gcc-${{ matrix.gcc }}" >> $GITHUB_ENV
          echo "CXX=g++-${{ matrix.gcc }}" >> $GITHUB_ENV

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev libxfixes-dev python3

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DENGINE_BUILD_TESTS=ON -DENGINE_BUILD_SANDBOX=ON -DENGINE_BUILD_EDITOR=ON

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --timeout 60

      - name: Package executables
        if: matrix.gcc == '14'
        run: |
          mkdir -p artifacts
          cp build/bin/Sandbox artifacts/
          cp build/bin/EngineTests artifacts/
          cp build/bin/EclipseEditor artifacts/
          cd artifacts
          tar czf eclipse-engine-linux-x86_64.tar.gz *

      - name: Upload executables
        uses: actions/upload-artifact@v4
        if: matrix.gcc == '14'
        with:
          name: linux-x86_64-gcc14
          path: artifacts/
          if-no-files-found: warn

  build-windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: cmd
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DENGINE_BUILD_TESTS=ON -DENGINE_BUILD_SANDBOX=ON -DENGINE_BUILD_EDITOR=ON

      - name: Build
        shell: cmd
        run: cmake --build build --config Release -- /m

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --timeout 60 -C Release

      - name: Package executables
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item build/bin/Release/Sandbox.exe artifacts/
          Copy-Item build/bin/Release/EngineTests.exe artifacts/
          Copy-Item build/bin/Release/EclipseEditor.exe artifacts/
          Compress-Archive -Path artifacts/* -DestinationPath artifacts/eclipse-engine-windows-x86_64.zip

      - name: Upload executables
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-msvc
          path: artifacts/
          if-no-files-found: warn

  build-macos:
    name: macOS (Clang)
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DENGINE_BUILD_TESTS=ON -DENGINE_BUILD_SANDBOX=ON -DENGINE_BUILD_EDITOR=ON

      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.ncpu)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --timeout 60

      - name: Package executables
        run: |
          mkdir -p artifacts
          cp build/bin/Sandbox artifacts/
          cp build/bin/EngineTests artifacts/
          cp build/bin/EclipseEditor artifacts/
          cd artifacts
          tar czf eclipse-engine-macos-arm64.tar.gz *

      - name: Upload executables
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-clang
          path: artifacts/
          if-no-files-found: warn

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Eclipse Engine Latest Build
          body: |
            ## Eclipse Engine — Latest Build

            Auto-generated from the latest push to `main`.

            ### Downloads
            - **Windows**: `eclipse-engine-windows-x86_64.zip`
            - **Linux**: `eclipse-engine-linux-x86_64.tar.gz`
            - **macOS**: `eclipse-engine-macos-arm64.tar.gz`

            ### Contents
            - `EclipseEditor` / `EclipseEditor.exe` — The editor
            - `Sandbox` / `Sandbox.exe` — The sandbox demo
            - `EngineTests` / `EngineTests.exe` — The test suite
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          prerelease: true
          make_latest: false
