name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux (GCC 14)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 ninja-build libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev libxfixes-dev python3
          echo "CC=gcc-14" >> $GITHUB_ENV
          echo "CXX=g++-14" >> $GITHUB_ENV

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: linux-deps-${{ hashFiles('CMake/Dependencies.cmake') }}

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DENGINE_BUILD_TESTS=ON -DENGINE_BUILD_SANDBOX=ON -DENGINE_BUILD_EDITOR=ON

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --timeout 60

      - name: Package executables
        run: |
          mkdir -p artifacts
          cp build/bin/Sandbox artifacts/
          cp build/bin/EngineTests artifacts/
          cp build/bin/EclipseEditor artifacts/
          cd artifacts
          tar czf eclipse-engine-linux-x86_64.tar.gz *

      - name: Upload executables
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: artifacts/
          if-no-files-found: warn

  build-windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: windows-deps-${{ hashFiles('CMake/Dependencies.cmake') }}

      - name: Configure
        shell: cmd
        run: call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" && cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DENGINE_BUILD_TESTS=ON -DENGINE_BUILD_SANDBOX=ON -DENGINE_BUILD_EDITOR=ON

      - name: Build
        shell: cmd
        run: call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" && cmake --build build --config Release -j%NUMBER_OF_PROCESSORS%

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --timeout 60 -C Release

      - name: Package executables
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item build/bin/Sandbox.exe artifacts/
          Copy-Item build/bin/EngineTests.exe artifacts/
          Copy-Item build/bin/EclipseEditor.exe artifacts/
          Compress-Archive -Path artifacts/* -DestinationPath artifacts/eclipse-engine-windows-x86_64.zip

      - name: Upload executables
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: artifacts/
          if-no-files-found: warn

  build-macos:
    name: macOS (Clang)
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: brew install ninja

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: macos-deps-${{ hashFiles('CMake/Dependencies.cmake') }}

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DENGINE_BUILD_TESTS=ON -DENGINE_BUILD_SANDBOX=ON -DENGINE_BUILD_EDITOR=ON

      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.ncpu)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --timeout 60

      - name: Package executables
        run: |
          mkdir -p artifacts
          cp build/bin/Sandbox artifacts/
          cp build/bin/EngineTests artifacts/
          cp build/bin/EclipseEditor artifacts/
          cd artifacts
          tar czf eclipse-engine-macos-arm64.tar.gz *

      - name: Upload executables
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: artifacts/
          if-no-files-found: warn

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.0.1-dev
          name: "0.0.1 Dev Build"
          body: |
            ## Eclipse Engine — 0.0.1 Dev Build

            Auto-generated from the latest push to `main`.

            ### Downloads
            - **Windows**: `eclipse-engine-windows-x86_64.zip`
            - **Linux**: `eclipse-engine-linux-x86_64.tar.gz`
            - **macOS**: `eclipse-engine-macos-arm64.tar.gz`

            ### Contents
            - `EclipseEditor` / `EclipseEditor.exe` — The editor
            - `Sandbox` / `Sandbox.exe` — The sandbox demo
            - `EngineTests` / `EngineTests.exe` — The test suite
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          prerelease: true
          make_latest: false
